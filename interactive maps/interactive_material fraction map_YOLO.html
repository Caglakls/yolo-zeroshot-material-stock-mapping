<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f5; }
  #map { width: 100vw; height: 100vh; }

  /* ── Popup ── */
  .mat-popup { min-width: 220px; font-size: 13px; }
  .mat-popup h3 { font-size: 14px; font-weight: 700; margin-bottom: 6px;
                   letter-spacing: .3px; color: #111; }
  .mat-popup .dom-line { margin-bottom: 8px; color: #444; font-size: 12px; }
  .mat-popup .dom-line b { color: #111; }
  .bar-row { display: flex; align-items: center; margin-bottom: 4px; gap: 6px; }
  .bar-label { width: 90px; font-size: 11.5px; color: #555; flex-shrink: 0; text-align: right; }
  .bar-track { flex: 1; background: #e8e8e8; border-radius: 4px; height: 8px; }
  .bar-fill  { height: 8px; border-radius: 4px; background: #3b82f6; }
  .bar-pct   { width: 36px; font-size: 11px; color: #333; text-align: right; flex-shrink: 0; }

  /* ── Legend ── */
  .legend { background: white; padding: 12px 14px; border-radius: 8px;
             box-shadow: 0 2px 8px rgba(0,0,0,.18); font-size: 12.5px; line-height: 1.8; }
  .legend strong { display: block; margin-bottom: 4px; font-size: 13px; }
  .legend-item { display: flex; align-items: center; gap: 7px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
</style>

const LABELS    = {"brick": "Brick", "dec_stone": "Dec. Stone", "metal": "Metal", "fibercement": "Fiber Cement", "vinyl": "Vinyl", "stucco": "Stucco", "acm": "ACM", "unknown": "Unknown / no detection"};
const MATERIALS = ["brick", "dec_stone", "metal", "fibercement", "vinyl", "stucco", "acm"];

// ── Map init ──────────────────────────────────────────────────────────────────
const map = L.map('map').setView([39.9744, -75.1290], 15);

  attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);

// ── Helper: build popup HTML ──────────────────────────────────────────────────
function buildPopup(f) {
  const domLabel = LABELS[f.dominant] || f.dominant;
  const domColor = COLORS[f.dominant] || '#999';
  let rows = '';
  for (const m of MATERIALS) {
    const pct = f.pcts[m] || 0;
    if (pct === 0) continue;
    const label = LABELS[m] || m;
    const w = Math.min(100, pct);
    rows += `
      <div class="bar-row">
        <span class="bar-label">${label}</span>
        <div class="bar-track"><div class="bar-fill" style="width:${w}%"></div></div>
        <span class="bar-pct">${pct.toFixed(1)}%</span>
      </div>`;
  }
  if (!rows) rows = '<div style="color:#888;font-size:11px">No material data</div>';
  return `
    <div class="mat-popup">
      <h3>${f.address}</h3>
      <div class="dom-line">Dominant material: <b style="color:${domColor}">${domLabel}</b></div>
      ${rows}
    </div>`;
}

// ── Plot dots ─────────────────────────────────────────────────────────────────
for (const f of FEATURES) {
  const color = COLORS[f.dominant] || '#BDC3C7';
  const circle = L.circleMarker([f.lat, f.lon], {
    radius: 6,
    fillColor: color,
    color: 'white',
    weight: 1.2,
    fillOpacity: 0.9,
  });
  circle.bindPopup(buildPopup(f), { maxWidth: 280 });
  circle.addTo(map);
}

// ── Legend ────────────────────────────────────────────────────────────────────
const legend = L.control({ position: 'bottomright' });
legend.onAdd = function() {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = '<strong>Dominant Material</strong>';
  const order = ['brick','stucco','vinyl','fibercement','dec_stone','metal','acm','unknown'];
  for (const m of order) {
    const c = COLORS[m] || '#999';
    const l = LABELS[m] || m;
    div.innerHTML += `<div class="legend-item"><div class="legend-dot" style="background:${c}"></div>${l}</div>`;
  }
  return div;
};
legend.addTo(map);
